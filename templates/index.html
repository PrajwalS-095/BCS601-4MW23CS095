<!DOCTYPE html>
<html>
<head>
    <title>Student Grade App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🎓 Student Grade App</h1>

    <form method="POST">
        <input type="number" name="m1" placeholder="Subject 1 Marks" required>
        <input type="number" name="m2" placeholder="Subject 2 Marks" required>
        <input type="number" name="m3" placeholder="Subject 3 Marks" required>
        <input type="number" name="m4" placeholder="Subject 4 Marks" required>
        <input type="number" name="m5" placeholder="Subject 5 Marks" required>

        <button type="submit">Calculate</button>
    </form>

    {% if result %}
    <div class="result">
        {% if result.error %}
            <p style="color:red;">{{ result.error }}</p>
        {% else %}
            <p><b>Total:</b> {{ result.total }}</p>
            <p><b>Percentage:</b> {{ result.percentage }}%</p>
            <p><b>Grade:</b> {{ result.grade }}</p>
        {% endif %}
    </div>
    {% endif %}
</div>

</body>
</html>
